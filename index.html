<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary Meta Tags -->
    <title>Markdown2Social - Convert Markdown to Social Media Posts</title>
    <meta name="title" content="Markdown2Social - Convert Markdown to Social Media Posts" />
    <meta
      name="description"
      content="Free online tool to convert Markdown to perfectly formatted social media posts for Twitter/X, LinkedIn, Instagram, Mastodon, Bluesky, Reddit, YouTube, Discord, and Threads. Preview and copy with one click."
    />
    <meta
      name="keywords"
      content="markdown converter, social media tool, twitter formatter, linkedin formatter, mastodon formatter, bluesky formatter, markdown to social, social media preview, content formatting, markdown editor"
    />
    <meta name="author" content="Markdown2Social" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#007acc" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://algovyn.github.io/markdown2social/" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/logo/logo.svg" />
    <link rel="apple-touch-icon" href="/logo/logo.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://algovyn.github.io/markdown2social/" />
    <meta property="og:title" content="Markdown2Social - Convert Markdown to Social Media Posts" />
    <meta
      property="og:description"
      content="Free online tool to convert Markdown to perfectly formatted social media posts. Preview and copy for Twitter, LinkedIn, Instagram, Mastodon, and more."
    />
    <meta property="og:site_name" content="Markdown2Social" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://algovyn.github.io/markdown2social/logo/logo.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://algovyn.github.io/markdown2social/" />
    <meta
      property="twitter:title"
      content="Markdown2Social - Convert Markdown to Social Media Posts"
    />
    <meta
      property="twitter:description"
      content="Free online tool to convert Markdown to perfectly formatted social media posts. Preview and copy for Twitter, LinkedIn, Instagram, Mastodon, and more."
    />
    <meta property="twitter:creator" content="@markdown2social" />
    <meta property="twitter:image" content="https://algovyn.github.io/markdown2social/logo/logo.svg" />

    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Markdown2Social",
        "url": "https://algovyn.github.io/markdown2social/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "description": "Free online tool to convert Markdown to perfectly formatted social media posts for Twitter/X, LinkedIn, Instagram, Mastodon, Bluesky, Reddit, YouTube, Discord, and Threads.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": "Markdown parsing, Social media preview, One-click copy, Multi-platform support, Character counting"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
